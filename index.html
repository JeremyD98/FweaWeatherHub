<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f4f2ee" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Fwea's Hub" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>Fwea's weather hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --bg: #f4f2ee;
    --bg-2: #ebe8e2;
    --panel: #ffffff;
    --panel-2: #f7f5f1;
    --text: #111111;
    --muted: #7a7570;
    --accent: #111111;
    --border: rgba(17, 17, 17, 0.09);
    --border-strong: rgba(17, 17, 17, 0.18);
    --serif: 'Playfair Display', 'Iowan Old Style', Georgia, 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: var(--sans);
    font-weight: 400;
    color: var(--text);
    padding: 0;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
    background-color: var(--bg);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='900' height='900'><filter id='m'><feTurbulence type='fractalNoise' baseFrequency='0.008 0.02' numOctaves='4' seed='4'/><feColorMatrix values='0 0 0 0 0.07  0 0 0 0 0.07  0 0 0 0 0.07  0 0 0 0.55 0'/><feComponentTransfer><feFuncA type='linear' slope='2.4' intercept='-1.4'/></feComponentTransfer></filter><rect width='100%' height='100%' filter='url(%23m)'/></svg>"),
      radial-gradient(1200px 800px at 50% 30%, #ffffff 0%, #f4f2ee 45%, #e9e6e0 100%);
    background-blend-mode: multiply, normal;
    background-size: 900px 900px, auto;
    background-attachment: fixed, fixed;
  }
  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 24px calc(env(safe-area-inset-right, 0px) + 16px) calc(env(safe-area-inset-bottom, 0px) + 100px) calc(env(safe-area-inset-left, 0px) + 16px);
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  h1 {
    font-family: var(--serif);
    font-size: 40px;
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1.05;
    color: var(--text);
  }
  .subtitle {
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    font-size: 15px;
    margin-top: 4px;
    letter-spacing: 0.01em;
  }
  .rule {
    width: 40px;
    height: 1px;
    background: var(--border-strong);
    margin: 14px auto 0;
  }

  .location-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .location-bar input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 2px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .location-bar input::placeholder { color: #a8a29b; }
  .location-bar input:focus { border-color: var(--text); }
  .location-bar button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0 14px;
    border-radius: 2px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.02em;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .location-bar button:hover { background: var(--panel-2); }
  .location-bar #geoBtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    color: var(--text);
  }
  .location-bar button.primary {
    background: var(--text);
    border-color: var(--text);
    color: #ffffff;
  }
  .location-bar button.primary:hover { background: #000; }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .preset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.03em;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .preset:hover { color: var(--text); border-color: var(--border-strong); }
  .preset.active {
    background: var(--text);
    border-color: var(--text);
    color: #ffffff;
  }

  .location-label {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px 10px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }
  .staleness {
    font-family: var(--sans);
    font-style: normal;
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .staleness::before { content: '·'; margin-right: 8px; opacity: 0.55; }
  .staleness.stale { color: #8b1a1a; opacity: 1; }

  .ptr-indicator {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateY(-60px);
    z-index: 200;
    color: var(--muted);
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    pointer-events: none;
    letter-spacing: 0.02em;
  }
  .ptr-indicator.animate { transition: transform 0.22s cubic-bezier(0.2, 0.9, 0.3, 1); }
  .ptr-indicator.active { transform: translateY(0); }
  .ptr-arrow {
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.15s ease;
  }
  .ptr-indicator.ready .ptr-arrow { transform: rotate(180deg); }
  .ptr-indicator.spinning .ptr-arrow {
    animation: ptrSpin 0.9s linear infinite;
  }
  @keyframes ptrSpin {
    to { transform: rotate(360deg); }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 12px;
    box-shadow: 0 1px 2px rgba(17, 17, 17, 0.03);
  }
  .card.map-card {
    padding: 0;
    overflow: hidden;
    border-color: var(--border-strong);
  }
  #map {
    height: 220px;
    width: 100%;
    background: #eae7e0;
    filter: contrast(1.05);
  }
  .leaflet-container {
    background: #eae7e0;
    font-family: var(--sans);
  }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: 0 4px 12px rgba(17,17,17,0.08);
  }
  .leaflet-popup-content { font-size: 13px; margin: 8px 12px; }
  .leaflet-control-attribution {
    background: rgba(255, 255, 255, 0.75) !important;
    color: var(--muted) !important;
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: var(--muted) !important; }
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }

  .now {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
  }
  .now-primary { flex-shrink: 0; }
  .now-temp-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  .now-temp {
    font-family: var(--serif);
    font-size: 76px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 0.9;
  }
  .now-tag {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--muted);
    padding-bottom: 10px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .feels-like {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 10px;
  }
  .now-blurb {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--text);
    line-height: 1.4;
    text-align: right;
    max-width: 260px;
    letter-spacing: 0.005em;
  }
  .now-blurb .rain-timing {
    display: block;
    color: var(--muted);
    font-style: italic;
    font-size: 14px;
    margin-top: 6px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .stat {
    padding: 4px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 400;
  }
  .rain-timeline {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .timeline-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .timeline-bars {
    display: flex;
    align-items: flex-end;
    height: 32px;
    gap: 1px;
    position: relative;
  }
  .timeline-bar {
    flex: 1;
    background: var(--text);
    min-height: 1px;
    border-radius: 1px;
  }
  .timeline-bar.past { opacity: 0.12; }
  .timeline-now {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 1px;
    background: var(--text);
    pointer-events: none;
  }
  .timeline-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .timeline-empty {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 10px 0;
  }

  .rec-headline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 20px;
    color: var(--text);
    letter-spacing: 0.005em;
    line-height: 1.25;
  }
  .rec-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .rec-list li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .rec-list li:last-child { border-bottom: none; padding-bottom: 0; }
  .rec-list .icon {
    flex-shrink: 0;
    width: 20px;
    text-align: center;
    filter: grayscale(1) contrast(1.1);
    opacity: 0.85;
  }

  .status {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
    font-family: var(--serif);
    font-style: italic;
  }
  .status.error { color: #8b1a1a; }

  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 32px;
  }
  .footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); }
  .info-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .info-btn:hover {
    color: var(--text);
    border-color: var(--border-strong);
  }
  .info-btn svg { width: 12px; height: 12px; }

  @keyframes staggerIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .stagger {
    animation: staggerIn 0.55s cubic-bezier(0.2, 0.9, 0.3, 1) both;
  }
  .stagger-1 { animation-delay: 0ms; }
  .stagger-2 { animation-delay: 120ms; }
  .stagger-3 { animation-delay: 260ms; }
  .stagger-4 { animation-delay: 400ms; }

  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(17, 17, 17, 0.45); }
    70%  { box-shadow: 0 0 0 12px rgba(17, 17, 17, 0); }
    100% { box-shadow: 0 0 0 0 rgba(17, 17, 17, 0); }
  }
  .pulse-hint { animation: pulseRing 1.6s ease-out 3; }
  .chat-toggle.pulse-hint { animation: pulseRing 1.6s ease-out 3; }

  @media (prefers-reduced-motion: reduce) {
    .stagger, .pulse-hint, .chat-toggle.pulse-hint { animation: none; }
  }

  .chat-toggle {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    right: 20px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--text);
    color: #ffffff;
    border: none;
    box-shadow: 0 8px 22px rgba(17,17,17,0.22);
    cursor: pointer;
    z-index: 105;
    display: none;
    align-items: center;
    justify-content: center;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    font-family: inherit;
  }
  .chat-toggle.visible { display: inline-flex; }
  .chat-toggle:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(17,17,17,0.28); }
  .chat-toggle svg { width: 24px; height: 24px; }
  .chat-toggle .badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f57c00;
    border: 2px solid var(--text);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.2); opacity: 0.85; }
  }
  .chat-menu {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 88px);
    right: 20px;
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 12px 32px rgba(17,17,17,0.14);
    z-index: 95;
    animation: bubbleIn 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  .chat-menu[hidden] { display: none; }
  .chat-menu-header {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    padding: 8px 10px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .chat-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    width: 100%;
    text-align: left;
    font-family: inherit;
    color: var(--text);
    transition: background 0.12s ease;
  }
  .chat-option:hover { background: var(--panel-2); }
  .chat-option-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text);
  }
  .chat-option-icon svg { width: 19px; height: 19px; fill: currentColor; }
  .chat-option-icon--emoji { font-size: 18px; line-height: 1; border-color: transparent; }
  .chat-option-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.2;
  }
  .chat-option-name {
    font-size: 14px;
    font-weight: 500;
  }
  .chat-option-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .assistant-bubble {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 88px);
    right: 20px;
    width: 300px;
    background: rgba(255, 255, 255, 0.7);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    backdrop-filter: blur(14px) saturate(180%);
    border: 1px solid rgba(17, 17, 17, 0.14);
    border-radius: 12px;
    padding: 18px 18px 16px;
    box-shadow: 0 12px 32px rgba(17,17,17,0.14);
    z-index: 100;
    animation: bubbleIn 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  .assistant-bubble[hidden] { display: none; }
  .assistant-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    right: 27px;
    width: 14px;
    height: 14px;
    background: rgba(255, 255, 255, 0.7);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    backdrop-filter: blur(14px) saturate(180%);
    border-right: 1px solid rgba(17, 17, 17, 0.14);
    border-bottom: 1px solid rgba(17, 17, 17, 0.14);
    transform: rotate(45deg);
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(12px) scale(0.94); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .assistant-close {
    position: absolute;
    top: 6px;
    right: 8px;
    background: transparent;
    border: none;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    font-family: inherit;
  }
  .assistant-close:hover { color: var(--text); }
  .assistant-portrait {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  .assistant-portrait svg {
    width: 84px;
    height: 84px;
    animation: portraitFloat 3s ease-in-out infinite;
  }
  @keyframes portraitFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }
  .assistant-name {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 16px;
  }
  .assistant-role {
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    font-size: 12px;
    margin-left: 6px;
  }
  .assistant-speech {
    display: block;
    margin-top: 6px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
  }

  @media (max-width: 520px) {
    .assistant-bubble {
      right: 14px;
      left: 14px;
      width: auto;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 84px);
    }
    .assistant-bubble::after { right: 27px; }
    .chat-toggle { right: 14px; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); }
    .chat-menu {
      right: 14px;
      left: 14px;
      width: auto;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
    }
  }

  .suggestions {
    margin-top: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
    box-shadow: 0 4px 12px rgba(17,17,17,0.06);
  }
  .suggestions.visible { display: block; }
  .suggestion {
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover { background: var(--panel-2); }
  .suggestion .sub { color: var(--muted); font-size: 12px; font-style: italic; font-family: var(--serif); }

  @media (max-width: 520px) {
    body {
      padding: calc(env(safe-area-inset-top, 0px) + 24px) calc(env(safe-area-inset-right, 0px) + 14px) calc(env(safe-area-inset-bottom, 0px) + 40px) calc(env(safe-area-inset-left, 0px) + 14px);
    }
    .header { margin-bottom: 22px; }
    h1 { font-size: 32px; }
    .card { padding: 22px 20px; }
    .location-bar input { padding: 12px 14px; font-size: 16px; }
    .location-bar button, .location-bar button.primary { padding: 0 16px; font-size: 14px; }
    .location-bar #geoBtn { min-width: 46px; }
    .preset { padding: 7px 14px; font-size: 12.5px; }
    .now {

  /* ═══════════════════════════════════════════════════════════

  .hero-shine {

  /* What to wear card — reuse existing rec-headline/rec-list */

  /* Adjust preset chips + location-bar to glass */

  .preset.active {

  @media (max-width: 480px) {

</style>
</head>

function getCharacterMessage(charKey, w) {
  const t = w.current.apparent_temperature;
  const rainProb = w.daily.precipitation_probability_max?.[0] ?? 0;
  const code = w.current.weather_code;
  const isRaining = (code >= 51 && code <= 82 && ![71,73,75,77].includes(code));
  const band = t < -5 ? 'freezing'
             : t < 5 ? 'cold'
             : t < 12 ? 'chilly'
             : t < 18 ? 'mild'
             : t < 24 ? 'nice'
             : t < 30 ? 'warm'
             : 'hot';

  const lines = CHARACTER_LINES[charKey][band];
  let msg = pickVariant(`fwea:lastLine:${charKey}:${band}`, lines);

  if (isRaining || rainProb >= 70) {
    const rainVariants = RAIN_LINES[charKey] || [];
    if (rainVariants.length) {
      let rainMsg = pickVariant(`fwea:lastRain:${charKey}`, rainVariants);
      rainMsg = rainMsg.replace('{RAIN}', String(Math.round(rainProb)));
      msg += rainMsg;
    }
  }
  return msg;
}

function pickVariant(storageKey, arr) {
  if (!arr || !arr.length) return '';
  if (arr.length === 1) return arr[0];
  const lastIdx = parseInt(localStorage.getItem(storageKey) ?? '-1', 10);
  let idx = Math.floor(Math.random() * arr.length);
  if (idx === lastIdx) idx = (idx + 1) % arr.length;
  localStorage.setItem(storageKey, String(idx));
  return arr[idx];
}

function showAssistant(charKey) {
  if (!currentWeather) return;
  const c = CHARACTERS[charKey];
  if (!c) return;
  document.getElementById('assistantPortrait').innerHTML = c.portrait;
  document.getElementById('assistantName').textContent = c.name;
  document.getElementById('assistantRole').textContent = c.role;
  document.getElementById('assistantSpeech').textContent = getCharacterMessage(charKey, currentWeather);
  document.getElementById('assistantBubble').hidden = false;
}

function hideAssistant() {
  document.getElementById('assistantBubble').hidden = true;
}

function isRainingALot(w) {
  if (!w) return false;
  const rainSum = w.daily.precipitation_sum?.[0] ?? 0;
  const code = w.current.weather_code;
  const hourly = w.hourly?.precipitation || [];
  const maxHourly = hourly.length ? Math.max(...hourly.slice(0, 24)) : 0;
  const heavyCodes = [65, 67, 82, 95, 96, 99];
  return rainSum >= 5 || maxHourly >= 1.5 || heavyCodes.includes(code);
}

function formatAge(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 45) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return `updated ${m} min ago`;
  const h = Math.floor(m / 60);
  return `updated ${h}h ago`;
}

function updateStaleness() {
  const el = document.getElementById('staleness');
  if (!el || !lastFetchedAt) return;
  const age = Date.now() - lastFetchedAt;
  el.textContent = formatAge(age);
  el.classList.toggle('stale', age > 30 * 60 * 1000);
}

function startStalenessTicker() {
  if (stalenessTimer) clearInterval(stalenessTimer);
  updateStaleness();
  stalenessTimer = setInterval(updateStaleness, 30000);
}

async function refreshCurrentLocation() {
  if (!currentLoc) return;
  await loadForLocation(currentLoc.lat, currentLoc.lon, currentLoc.label);
}

    node.classList.remove('stagger', 'stagger-1', 'stagger-2', 'stagger-3', 'stagger-4');
  });
  void document.body.offsetWidth;
  els.forEach((node, i) => {
    node.classList.add('stagger', `stagger-${i + 1}`);
  });

  const afterStagger = 250 + (els.length - 1) * 140 + 400;
  setTimeout(() => {
    showShrekWelcome();
    pulseHints();
  }, afterStagger);
}

async function geocode(query) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=en&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Geocoding failed');
  const data = await res.json();
  return data.results || [];
}

async function reverseGeocode(lat, lon) {
  try {
    const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=en&format=json`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    return (data.results && data.results[0]) || null;
  } catch {
    return null;
  }
}

async function fetchWeather(lat, lon) {
  const params = new URLSearchParams({
    latitude: lat,
    longitude: lon,
    current: 'temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,is_day',
    hourly: 'temperature_2m,precipitation_probability,precipitation,weather_code,uv_index',
    daily: 'temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,uv_index_max,sunrise,sunset,weather_code',
    temperature_unit: 'celsius',
    wind_speed_unit: 'kmh',
    precipitation_unit: 'mm',
    timezone: 'auto',
    forecast_days: 2,
  });
  const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!res.ok) throw new Error('Weather fetch failed');
  return res.json();
}

function describeCode(code) {
  return WEATHER_CODES[code] || { text: 'Unknown', icon: '🌡️' };
}

function formatHour(iso) {
  const h = parseInt(iso.slice(11, 13), 10);
  if (h === 0) return 'midnight';
  if (h < 12) return `${h}am`;
  if (h === 12) return 'noon';
  return `${h - 12}pm`;
}

function findRainWindows(w) {
  const times = w.hourly.time;
  const probs = w.hourly.precipitation_probability;
  const precips = w.hourly.precipitation;
  const nowStr = w.current.time;
  let nowIdx = times.findIndex(t => t >= nowStr);
  if (nowIdx < 0) nowIdx = 0;
  const endStr = nowStr.slice(0, 10) + 'T23:59';
  let endIdx = times.findIndex(t => t > endStr);
  if (endIdx < 0) endIdx = Math.min(nowIdx + 18, times.length);

  const windows = [];
  let start = null;
  for (let i = nowIdx; i < endIdx; i++) {
    const wet = probs[i] >= 40 || precips[i] >= 0.3;
    if (wet && start === null) start = i;
    else if (!wet && start !== null) {
      windows.push([start, i]);
      start = null;
    }
  }
  if (start !== null) windows.push([start, endIdx]);
  return windows.map(([s, e]) => ({ start: times[s], end: times[e] || times[endIdx - 1] }));
}

function buildDayBlurb(w) {
  const cond = describeCode(w.current.weather_code).text;
  const dayMax = Math.round(w.daily.temperature_2m_max?.[0] ?? 0);
  const dayMin = Math.round(w.daily.temperature_2m_min?.[0] ?? 0);
  const rangeText = `Today: high ${dayMax}°, low ${dayMin}°.`;
  const windows = findRainWindows(w);
  let timing = '';
  if (windows.length === 0) {
    const anyPastRain = (w.daily.precipitation_sum?.[0] ?? 0) > 0.2;
    timing = anyPastRain ? 'Rain earlier has cleared — dry from here.' : 'No rain in the forecast.';
  } else if (windows.length === 1) {
    const startHr = parseInt(windows[0].start.slice(11, 13), 10);
    const endHr = parseInt(windows[0].end.slice(11, 13), 10);
    const startTxt = formatHour(windows[0].start);
    const endTxt = formatHour(windows[0].end);
    const spansEndOfDay = endHr === 0 || endHr === 23;
    if (spansEndOfDay && startHr <= 17) {
      timing = `Rain likely from ${startTxt}, through the evening.`;
    } else if (spansEndOfDay) {
      timing = `Rain likely from ${startTxt}, into the night.`;
    } else {
      timing = `Rain likely ${startTxt}–${endTxt}.`;
    }
  } else {
    const parts = windows.slice(0, 2).map(w => `${formatHour(w.start)}–${formatHour(w.end)}`);
    timing = `Rain windows: ${parts.join(', ')}${windows.length > 2 ? '…' : ''}.`;
  }
  return { main: `${cond}. ${rangeText}`, timing };
}

function buildRainTimeline(w) {
  const times = w.hourly.time;
  const probs = w.hourly.precipitation_probability;
  if (!times || !probs) return '';
  const dayPrefix = w.current.time.slice(0, 10);
  const todayIdx = [];
  for (let i = 0; i < times.length; i++) {
    if (times[i].startsWith(dayPrefix)) todayIdx.push(i);
  }
  if (todayIdx.length === 0) return '';
  const nowHour = parseInt(w.current.time.slice(11, 13), 10);
  const maxProb = Math.max(1, ...todayIdx.map(i => probs[i] || 0));
  const bars = todayIdx.map(i => {
    const hour = parseInt(times[i].slice(11, 13), 10);
    const p = probs[i] || 0;
    const heightPct = Math.max(2, (p / maxProb) * 100);
    const isPast = hour < nowHour;
    return `<div class="timeline-bar${isPast ? ' past' : ''}" style="height:${heightPct}%" title="${hour}:00 — ${p}%"></div>`;
  }).join('');
  const nowLeftPct = ((nowHour + 0.5) / 24) * 100;
  const timelineLabel = isRainingALot(w) ? `Rain probability — ${LAWT_PHRASE}` : 'Rain probability, hour by hour';
  return `
    <div class="rain-timeline">
      <div class="timeline-label">${timelineLabel}</div>
      <div class="timeline-bars">
        ${bars}
        <div class="timeline-now" style="left:${nowLeftPct}%"></div>
      </div>
      <div class="timeline-axis">
        <span>midnight</span>
        <span>6am</span>
        <span>noon</span>
        <span>6pm</span>
        <span>11pm</span>
      </div>
    </div>
  `;
}

function buildRecommendation(w) {
  const feels = w.current.apparent_temperature;
  const wind = w.current.wind_speed_10m;
  const gusts = w.current.wind_gusts_10m;
  const uv = w.daily.uv_index_max?.[0] ?? 0;
  const rainProb = w.daily.precipitation_probability_max?.[0] ?? 0;
  const rainSum = w.daily.precipitation_sum?.[0] ?? 0;
  const code = w.current.weather_code;
  const dayMax = w.daily.temperature_2m_max?.[0] ?? feels;
  const dayMin = w.daily.temperature_2m_min?.[0] ?? feels;

  const items = [];
  let headline;

  if (feels < -5) {
    headline = 'bruh are you in antarctica or something.';
    items.push(['🧥', 'Heavy winter coat, insulated']);
    items.push(['🧣', 'Scarf, beanie, and gloves']);
    items.push(['👖', 'Thermal base layer under trousers']);
    items.push(['👢', 'Warm, waterproof boots']);
  } else if (feels < 5) {
    headline = 'cold asf stay home ngl';
    items.push(['🧥', 'Winter coat or heavy jacket']);
    items.push(['🧣', 'Scarf and gloves recommended']);
    items.push(['👖', 'Long trousers, maybe a base layer']);
  } else if (feels < 12) {
    headline = 'bruh it\'s cold ngl wear the cute puffer';
    items.push(['🧥', 'Jacket or heavy sweater']);
    items.push(['👕', 'Long sleeves underneath']);
    items.push(['👖', 'Full-length trousers']);
  } else if (feels < 18) {
    headline = 'don\'t be like jewemy wear a sweater';
    items.push(['🧥', 'Light jacket or cardigan']);
    items.push(['👕', 'Long or short sleeves work']);
  } else if (feels < 24) {
    headline = 'nice day innit';
    items.push(['👕', 'T-shirt or light long-sleeve']);
    items.push(['👖', 'Trousers or jeans are fine']);
  } else if (feels < 30) {
    headline = 'kinda like u rn';
    items.push(['👕', 'T-shirt, breathable fabrics']);
    items.push(['🩳', 'Shorts or a light skirt']);
    items.push(['💧', 'Bring water']);
  } else {
    headline = 'r u in hell';
    items.push(['👕', 'Loose, light-coloured clothing']);
    items.push(['🩳', 'Shorts, sandals if you can']);
    items.push(['💧', 'Water is essential']);
  }

  const swingRange = dayMax - dayMin;
  if (swingRange >= 10 && feels < 25) {
    items.push(['🌡️', `Big temp swing today (${Math.round(dayMin)}° → ${Math.round(dayMax)}°) — layers you can shed`]);
  }

  const isRainCode = code >= 51 && code <= 82 && code !== 71 && code !== 73 && code !== 75 && code !== 77;
  if (isRainCode || rainProb >= 60 || rainSum >= 2) {
    if (rainSum >= 10 || code === 82 || (code >= 95 && code <= 99)) {
      items.push(['☔', 'Heavy rain expected — waterproof jacket + umbrella']);
    } else if (rainProb >= 40 || isRainCode) {
      items.push(['☂️', `Umbrella — ${Math.round(rainProb)}% rain chance today`]);
    }
  }

  if (code >= 71 && code <= 77 || code === 85 || code === 86) {
    items.push(['❄️', 'Snow — waterproof boots and traction']);
  }

  if (gusts >= 40 || wind >= 30) {
    items.push(['💨', `Windy (gusts ${Math.round(gusts)} km/h) — secure hats and loose layers`]);
  }

  if (uv >= 6 && w.current.is_day) {
    items.push(['🕶️', `High UV (${Math.round(uv)}) — sunglasses and sunscreen`]);
  }

  if (code >= 95 && code <= 99) {
    items.push(['⚡', 'Thunderstorms — avoid open areas']);
  }

  return { headline, items };
}

function pickTintForWeather(w) {
  const code = w.current.weather_code;
  const feels = w.current.apparent_temperature;
  const isDay = w.current.is_day;
  if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82) || (code >= 95 && code <= 99)) return 'rainy';
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return 'freezing';
  if (feels <= -2) return 'freezing';
  if (feels >= 30) return 'hot';
  if ((code === 0 || code === 1) && isDay) return 'clear';
  return null;
}

}

function formatSunTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, '0')}${ampm}`;
}

function formatDaylight(riseISO, setISO) {
  if (!riseISO || !setISO) return '';
  const rise = new Date(riseISO);
  const set = new Date(setISO);
  const mins = Math.max(0, Math.round((set - rise) / 60000));
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `Daylight: ${h}h ${m.toString().padStart(2, '0')}m`;
}

function sunPositionPct(w) {
  const rise = w.daily.sunrise?.[0];
  const set = w.daily.sunset?.[0];
  const now = w.current.time;
  if (!rise || !set || !now) return 0.5;
  const r = new Date(rise).getTime();
  const s = new Date(set).getTime();
  const n = new Date(now).getTime();
  if (n <= r) return 0;
  if (n >= s) return 1;
  return (n - r) / (s - r);
}

async function loadForLocation(lat, lon, label) {
  requestGen++;
  setStatus('Loading weather…');
  try {
    const [weather, place] = await Promise.all([
      fetchWeather(lat, lon),
      label ? Promise.resolve(null) : reverseGeocode(lat, lon),
    ]);
    const name = label || (place ? `${place.name}${place.admin1 ? ', ' + place.admin1 : ''}${place.country ? ', ' + place.country : ''}` : `${lat.toFixed(2)}, ${lon.toFixed(2)}`);
    currentWeather = weather;
    currentLoc = { lat, lon, label: name };
    lastFetchedAt = Date.now();
    renderWeather(weather, name);
    renderPresets(name);
    showMap(lat, lon, name);
    document.getElementById('chatToggle').classList.add('visible');
    startStalenessTicker();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ lat, lon, label: name }));
    if (!localStorage.getItem('fwea:onboarded')) {
      localStorage.setItem('fwea:onboarded', '1');
      setTimeout(playReveal, 60);
    }
  } catch (err) {
    console.error(err);
    setStatus(`Could not load weather: ${err.message || err}. Check your connection and try again.`, true);
  }
}

function useGeolocation() {
  const gen = ++requestGen;
  if (!navigator.geolocation) {
    setStatus('Geolocation not supported. Type a city instead.', true);
    return;
  }
  setStatus('Requesting your location…');
  navigator.geolocation.getCurrentPosition(
    pos => {
      if (gen !== requestGen) return;
      loadForLocation(pos.coords.latitude, pos.coords.longitude, null);
    },
    err => {
      console.warn(err);
      if (gen !== requestGen) return;
      setStatus('Location permission denied. Type a city to continue.', true);
    },
    { timeout: 10000, maximumAge: 5 * 60 * 1000 }
  );
}

async function handleSearch(query) {
  if (!query.trim()) return;
  requestGen++;
  hideSuggestions();
  setStatus('Finding location…');
  try {
    const results = await geocode(query);
    if (!results.length) {
      setStatus(`No results for "${query}".`, true);
      return;
    }
    if (results.length === 1) {
      const r = results[0];
      const label = `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}${r.country ? ', ' + r.country : ''}`;
      loadForLocation(r.latitude, r.longitude, label);
    } else {
      showSuggestions(results);
      setStatus('Pick a location above.');
    }
  } catch (err) {
    console.error(err);
    setStatus('Search failed. Try again.', true);
  }
}

function showSuggestions(results) {
  el.suggestions.innerHTML = results.map((r, i) => {
    const sub = [r.admin1, r.country].filter(Boolean).join(', ');
    return `<div class="suggestion" data-i="${i}">
      <div>${r.name}</div>
      <div class="sub">${sub}</div>
    </div>`;
  }).join('');
  el.suggestions.classList.add('visible');
  el.suggestions.querySelectorAll('.suggestion').forEach(node => {
    node.addEventListener('click', () => {
      const r = results[Number(node.dataset.i)];
      const label = `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}${r.country ? ', ' + r.country : ''}`;
      hideSuggestions();
      loadForLocation(r.latitude, r.longitude, label);
    });
  });
}

function hideSuggestions() {
  el.suggestions.classList.remove('visible');
  el.suggestions.innerHTML = '';
}

document.getElementById('chatToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  hideAssistant();
  toggleChatMenu();
});
document.querySelectorAll('.chat-option').forEach(btn => {
  btn.addEventListener('click', () => {
    closeChatMenu();
    showAssistant(btn.dataset.char);
  });
});
document.getElementById('assistantClose').addEventListener('click', hideAssistant);
document.getElementById('infoBtn').addEventListener('click', () => {
  if (!currentWeather) return;
  playReveal();
});
document.addEventListener('click', (e) => {
  const menu = document.getElementById('chatMenu');
  const toggle = document.getElementById('chatToggle');
  if (!menu.hidden && !menu.contains(e.target) && !toggle.contains(e.target)) {
    closeChatMenu();
  }
});

el.searchBtn.addEventListener('click', () => handleSearch(el.cityInput.value));
el.cityInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch(el.cityInput.value);
});
el.geoBtn.addEventListener('click', useGeolocation);

(function setupPullToRefresh() {
  const indicator = document.getElementById('ptrIndicator');
  const label = document.getElementById('ptrLabel');
  const THRESHOLD = 70;
  const MAX_PULL = 130;
  let startY = null;
  let currentPull = 0;
  let pulling = false;
  let refreshing = false;

  function setTranslate(y) {
    indicator.style.transform = `translateY(${y - 60}px)`;
  }
  function reset(animate = true) {
    indicator.classList.toggle('animate', animate);
    indicator.classList.remove('active', 'ready', 'spinning');
    indicator.style.transform = '';
    label.textContent = 'Pull to refresh';
    currentPull = 0;
    pulling = false;
  }

  document.addEventListener('touchstart', e => {
    if (refreshing) return;
    if (window.scrollY <= 0 && e.touches.length === 1) {
      startY = e.touches[0].clientY;
      indicator.classList.remove('animate');
    } else {
      startY = null;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (startY === null || refreshing) return;
    const y = e.touches[0].clientY;
    const delta = y - startY;
    if (delta > 0 && window.scrollY <= 0) {
      pulling = true;
      currentPull = Math.min(delta * 0.55, MAX_PULL);
      setTranslate(currentPull);
      indicator.classList.add('active');
      const ready = currentPull >= THRESHOLD;
      indicator.classList.toggle('ready', ready);
      label.textContent = ready ? 'Release to refresh' : 'Pull to refresh';
      if (e.cancelable) e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('touchend', async () => {
    if (!pulling || refreshing) { startY = null; pulling = false; return; }
    startY = null;
    if (currentPull >= THRESHOLD && currentLoc) {
      refreshing = true;
      indicator.classList.add('animate', 'spinning');
      indicator.classList.remove('ready');
      indicator.classList.add('active');
      indicator.style.transform = 'translateY(0)';
      label.textContent = 'Refreshing…';
      try {
        await refreshCurrentLocation();
      } catch (e) {
        console.warn(e);
      }
      refreshing = false;
      setTimeout(() => reset(true), 250);
    } else {
      indicator.classList.add('animate');
      reset(true);
    }
  });
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}

// Initial load: last saved location > geolocation > prompt
(function init() {
  renderPresets(null);
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const { lat, lon, label } = JSON.parse(saved);
      loadForLocation(lat, lon, label);
      return;
    } catch {}
  }
  useGeolocation();
})();
</script>
